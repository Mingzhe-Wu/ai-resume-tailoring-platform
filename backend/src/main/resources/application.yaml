spring:
  application:
    name: resume_tailor

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/resume_tailor}
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis:
  configuration:
    map-underscore-to-camel-case: true

ai:
  quota:
    daily-limit: ${AI_QUOTA_DAILY_LIMIT:100}
  rate-limit:
    resume-generate-per-minute: ${AI_RATE_LIMIT_RESUME_GENERATE_PER_MINUTE:3}
  pricing:
    input-per-million: ${AI_PRICING_INPUT_PER_MILLION:5.00}
    output-per-million: ${AI_PRICING_OUTPUT_PER_MILLION:30.00}

security:
  jwt:
    secret: ${JWT_SECRET:replace-this-with-a-long-secure-secret-key}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
